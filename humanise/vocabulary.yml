schema_version: "1"

# ---------------------------------------------------------------------------
# vocabulary.yml — user-facing strings + prose templates for the audit
# renderer.
#
# Editing tone is a vocabulary edit, not a code edit. Every string returned
# to the user (severity tier labels, action verbs, headline templates, all-
# clear copy, AI-pressure explanation, drill-in frame strings, depth summaries,
# failure-mode labels) lives here. grade.py reads via registries.string_for().
#
# Per-pattern `why_it_matters` prose lives in patterns.yaml (per-pattern, not
# generic); only the *frame* it renders into ("Why this matters: {prose}")
# lives here.
#
# {placeholder} substitution uses Python str.format. Missing key fails fast at
# load. Missing placeholder fails fast at render with placeholder + template
# key.
# ---------------------------------------------------------------------------

severity_labels:
  hard_fail: "Must fix"
  strong_warning: "Strong AI-writing signal"
  context_warning: "Context-sensitive signal"

action_labels:
  fix: "Fix"
  preserve_with_disclosure_or_user_decision: "Disclose or ask before preserving"

status_labels:
  clear: "Clear"
  flagged: "Flagged"
  none: "None"

pressure_status:
  triggered: "triggered"
  clear: "clear"

# Failure-mode catalogue — six entries. Read by failure_mode_results() and
# emitted in the JSON contract.
failure_modes:
  provenance_residue:
    label: "Provenance residue"
    summary: "Text leaks assistant, template, formatting, assignment, or publication-workflow residue."
  synthetic_significance:
    label: "Synthetic significance"
    summary: "Text performs importance, revelation, or depth without enough concrete support."
  frictionless_structure:
    label: "Frictionless structure"
    summary: "Text is packaged too evenly through headings, lists, repeated shapes, or tidy closures."
  generic_abstraction:
    label: "Generic abstraction"
    summary: "Text relies on portable abstractions, stock vocabulary, or low-specificity claims."
  voice_erasure:
    label: "Voice erasure"
    summary: "Text loses stance, concrete subjects, asymmetry, or authorial pressure."
  genre_misfit:
    label: "Genre misfit"
    summary: "Text uses a device that may be valid in one genre but suspicious in another."

# depth_consequence — keyed by severity. Returned via triggered_checks() and
# failure_mode_results() into the JSON contract.
depth_consequence:
  hard_fail: "Fix at Balanced and All."
  strong_warning: "Fix at Balanced and All unless the user explicitly accepts the risk after disclosure."
  context_warning: "Review at Balanced; All requires removal unless the user explicitly accepts the risk."

# depth_results.{balanced,all}.summary — five distinct outcomes in the JSON
# contract.
depth_summary:
  balanced_strong_or_hard: "Hard failures or strong warnings remain; fix or ask user before Balanced depth output."
  balanced_context_only: "No hard failures or strong warnings; context warnings need user decision."
  balanced_clean: "No hard failures, strong warnings, or context warnings."
  all_clean: "All checks pass."
  all_failures: "One or more checks fail; All depth requires a clean pass unless user explicitly accepts risk."

# format_human_report() section headings.
section_headings:
  main_issues: "Main issues found"
  full_check_table: "Full check table"

# Inline labels for the human-readable markdown report.
inline_labels:
  summary_prefix: "Summary:"
  severity_prefix: "Severity:"
  pressure_explanation_prefix: "AI-pressure explanation:"
  what_it_looks_for: "What it looks for:"
  what_happened_here: "What happened here:"
  why_this_matters: "Why this matters:"

# Templates for format_human_report(). Phase 2 keeps the existing markdown
# byte-equivalent; Phase 3 (U11) replaces this renderer with the dual-layer
# design and these templates are superseded.
templates:
  summary_flagged: "{flagged} of {total} checks were flagged for AI-style writing patterns."
  summary_all_clear: "All {total} checks were clear."
  severity_line: "{hard_fail} hard_fail · {strong_warning} strong_warning · {context_warning} context_warning · pressure: {pressure}"
  flagged_row: "- {label}: Flagged. What it looks for: {description} What happened here: {why_here} Why this matters: {why_matters} {depth} action: {action}."
  none_bullet: "- None."
  no_issue_found: "No issue found in this text."
  table_header: "| Check | Status | What it looks for | What happened here | Why this matters | {depth} action |"
  table_separator: "|---|---|---|---|---|---|"

# AI-pressure explanation chunks (assembled by _compose_pressure_explanation).
pressure_explanation:
  lead: "AI-pressure looks for accumulation: weaker patterns that may be harmless alone but become more meaningful when they appear together. "
  components_with_vocab: "Here the stacked signals were {components}, plus {vocab_points} point(s) from clustered AI vocabulary. That means the draft looked machine-packaged, with too much visible structure and too little natural variation. "
  components_only: "Here the stacked signals were {components}. That means the draft looked machine-packaged, with too much visible structure and too little natural variation. "
  vocab_only: "The only contribution here was {vocab_points} point(s) from clustered AI vocabulary. "
  no_components: "This text did not stack enough weak signals to suggest machine-packaged structure. "
  tail_triggered: "Score: {score}/{threshold}, so this check was flagged."
  tail_clear: "Score: {score}/{threshold}, so this check stayed clear."
