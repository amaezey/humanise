    80. potentially lead to

    81. a broad understanding

    82. contribute to the understanding

    83. shape the public

    84. particularly noteworthy

    85. the evidence base for decision making

    86. identify an area of improvement

    87. analysis of the data to analyze and use

    88. undergone a significant

    89. need a robust

    90. voice will fill

    91. concern a potential

    92. initiative aims to

    93. offering a unique

    94. a new avenue

    95. despite the challenge

    96. ready to embrace

    97. the societal expectation

    98. make accessible

    99. today at a fast pace

    100. stand in stark contrast


    **Kobak excess vocabulary:** The grader also loads the full 900-row `kobak-excess-words.csv` file from Kobak et al.''s `llm-excess-vocab` repository. The file includes `style`, `content`, `content/style`, and `other` annotations. The aggregate pressure check uses style-annotated terms as one vocabulary signal alongside the local AI-vocabulary list and all 100 GPTZero phrases. Kobak words do not fail text by themselves.


    Current threshold: vocabulary pressure contributes points to an overall score. The overall score only trips when vocabulary pressure combines with structural signals such as manufactured insight, contrived reframes, paragraph uniformity, unrequested headings, soft scaffolding, or assistant residue. This follows the paper''s corpus-level logic: excess vocabulary is evidence in a pattern, not a standalone detector verdict.


    **Before:**

    > Additionally, a distinctive feature of Somali cuisine is the incorporation of camel meat. An enduring testament to Italian colonial influence is the widespread adoption of pasta in the local culinary landscape, showcasing how these dishes have integrated into the traditional diet.


    **After:**

    > Somali cuisine also includes camel meat, which is considered a delicacy. Pasta dishes, introduced during Italian colonisation, remain common, especially in the south.


    **Severity:** strong_warning · `no-ai-vocabulary-clustering` (the soft-scaffold sub-bullet now also references `no-soft-scaffolding` — see #47)'
  patterns_md_leading_blanks: 1
no-anaphora:
  category: Voice and register
  short_name: Mechanical repeated sentence starts
  description: Checks for repeated sentence openings that read like template rhythm.
  why_it_matters: Mechanical repeated openings can signal template rhythm instead of intentional rhetoric.
  severity: context_warning
  failure_modes:
  - genre_misfit
  - frictionless_structure
  evidence_role: rhythm_signal
  guidance: Fix mechanical repetition; recommend preserving deliberate rhetoric or literary patterning.
  pattern_number: '51'
  patterns_md_heading: Mechanical repeated sentence starts
  patterns_md_body: 'Three or more consecutive sentences whose first word matches — "The X… The Y… The Z…", "We did… We saw… We learned…", "It was… It was… It was…". Anaphora is a real rhetorical device when it earns its weight (Lincoln, Churchill, Baldwin), but AI reaches for it as a default rhythm pattern when it has run out of structural ideas. The tell is repetition without escalation: three sentences starting the same way that do not build, contrast, or accumulate force.


    **Tolerance note:** Deliberate anaphora is one of the oldest rhetorical figures in English. Preserve when the repetition is doing structural work — building, contrasting, intensifying — or when it is character voice, oratory, or quoted speech.


    **Before:**

    > The team adopted the new framework. The team rewrote the docs. The team trained the support staff. The team rolled out the migration in three phases.


    **After:**

    > Adopting the new framework meant rewriting the docs and training the support staff before the team could roll out the migration in three phases.


    **Severity:** context_warning · `no-anaphora`


    **Detection:** Programmatic check `no-anaphora` (in the catalogue since the initial release at e68bc3d on 2026-04-01; **context_warning**). Flags three or more consecutive sentences whose first word matches case-insensitively, ignoring trivial starts ("I", "A", "The", "It", "It''s"). Distinct from #25 staccato rhythm (which fires on short standalone sentences regardless of opener) and from #35a orphaned demonstratives (vague-subject `this` in a single sentence) and #35b `This …` chains (paragraph-level repetition of `This` as subject).'
  patterns_md_leading_blanks: 2
no-bland-critical-template:
  category: Voice and register
  short_name: Bland critical template
  description: Checks for generic review language instead of concrete critical claims.
  why_it_matters: Bland critical language replaces concrete judgment with portable review phrases.
  severity: strong_warning
  failure_modes:
  - generic_abstraction
  - voice_erasure
  evidence_role: genre_cliche
  guidance: Fix at Balanced and All for reviews and criticism; replace generic balance with concrete claims from the work.
  alternatives: 'Stock evaluation phrases used in book and film reviews. They sound critical but commit to nothing specific. Common in AI-generated reviews because they are common in the genre''s training data.


    The middle column says what concrete claim the phrase usually substitutes for. The rewrite has to point at a specific scene, sentence, performance, or formal choice.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | ambitious in an old-fashioned way | (a specific formal choice the reviewer should name) | What is ambitious about it, and which old-fashioned tradition does it follow? |

    | earns its weight | (a specific scene or argument that justifies the length) | Empty without an example. |

    | social texture | (specific details about what people do, say, and own in the work) | Replace with the texture itself. |

    | emotional range | (the specific emotions the work covers, with examples) | Name two or three of them. |

    | field of sympathy | (which characters or positions the work treats with warmth) | Name them. |

    | moral strength | (the specific stance the work takes, and on what) | Empty without a position. |

    | slow revelation | (what specifically is revealed, and over what time) | Fine when the revelation is named. |

    | quietly devastating | (the specific scene or line that does the work) | Cliché unless anchored. |

    | richly observed | (the specific observations) | Same. |

    | beautifully crafted | (the specific formal choices) | Same. |'
  pattern_number: '46'
  patterns_md_heading: Bland critical template
  patterns_md_body: '**Words to watch:** "the kind of contemporary novel/film/book/album/show/essay that", "doing several familiar things at once", "what makes it more than", "emotional range", "field of sympathy", "moral strengths", "earns (much of) its weight", "ambitious in an old-fashioned way", "social texture", "slow revelation of", "difficult to dismiss".


    Generated literary, film, or review criticism that sounds balanced but generic. Replaces concrete claims about scenes, sentences, performances, or formal choices with portable evaluative phrases. The hallmark is a sentence that could appear in a review of any contemporary novel/film without changing a word.


    **Before:**

    > Tóibín''s novel is the kind of contemporary book that earns its weight through emotional range and slow revelation, doing several familiar things at once with a social texture that is difficult to dismiss.


    **After:**

    > The opening forty pages stay close to Henry''s silences — when his mother asks why he won''t write home from Rome, he changes the subject three times in two paragraphs. That refusal is the book''s structural engine, not its theme.


    **Severity:** strong_warning · `no-bland-critical-template`


    **Detection:** Programmatic check `no-bland-critical-template` (added in 9ce1cec on 2026-04-27 as part of the AI-writing-signal framework expansion; **strong_warning**). Closely related to #35 tonal uniformity in reviews and criticism — the tonal-uniformity entry mentions the same evaluative phrases ("emotional range", "field of sympathy", "moral strength") as a register signal; this check enforces them at phrase level.'
  patterns_md_leading_blanks: 2
no-boldface-overuse:
  category: Style
  short_name: Boldface overuse
  description: Checks for mechanical bold emphasis stacked across a passage of prose.
  why_it_matters: Mechanical boldface stacking flattens prose into emphasis-by-default and reads like generated formatting.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  evidence_role: emphasis_pattern
  guidance: Fix mechanical bold stacking; preserve only when bolded terms are genuine definition headers.
  pattern_number: '13'
  patterns_md_heading: Boldface overuse
  patterns_md_body: 'Emphasises phrases in boldface mechanically, bolding things that do not need visual emphasis.


    **Before:**

    > It blends **OKRs (Objectives and Key Results)**, **KPIs (Key Performance Indicators)**, and visual strategy tools such as the **Business Model Canvas (BMC)** and **Balanced Scorecard (BSC)**.


    **After:**

    > It blends OKRs, KPIs, and visual strategy tools like the Business Model Canvas and Balanced Scorecard.


    **Severity:** context_warning · `no-boldface-overuse`


    **Detection:** Programmatic check `no-boldface-overuse` (added in U1; flags four or more bold spans in non-list, non-heading prose).'
  patterns_md_leading_blanks: 1
no-collaborative-artifacts:
  category: Communication
  short_name: Assistant residue
  description: Checks for assistant-like collaboration phrases, follow-up offers, or generated-chat residue.
  why_it_matters: Assistant residue makes the text look like chat output rather than finished prose.
  severity: hard_fail
  failure_modes:
  - provenance_residue
  evidence_role: assistant_residue
  guidance: Fix at every depth; this is assistant residue, not authorial style.
  alternatives: 'Chatbot turn-taking residue left in published prose. These come from the assistant register and have no business in finished writing.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | Great question! | (cut entirely) | Never appropriate in published prose. |

    | Of course! | (cut) | Same. |

    | Certainly! | (cut) | Same. |

    | You''re absolutely right! | (cut) | Same. |

    | I hope this helps! | (cut) | Same. |

    | Let me know if you''d like me to expand | (cut) | Same. |

    | Here is an overview of | (cut; just give the overview) | Meta-narration that points at the content instead of being it. |

    | Would you like | (cut; or rephrase as a direct question to the reader if appropriate) | Chat register. |'
  pattern_number: '19'
  patterns_md_heading: Collaborative artifacts
  patterns_md_body: '**Words to watch:** I hope this helps, Of course!, Certainly!, You''re absolutely right!, Would you like..., let me know, here is a...


    Chatbot correspondence pasted directly into content without being cleaned up.


    **Before:**

    > Here is an overview of the French Revolution. I hope this helps! Let me know if you''d like me to expand on any section.


    **After:**

    > The French Revolution began in 1789 when financial crisis and food shortages led to widespread unrest.


    **Severity:** hard_fail · `no-collaborative-artifacts`'
  patterns_md_leading_blanks: 1
no-compound-modifier-density:
  category: Style
  short_name: Hyphenated compound modifier overuse
  description: Checks for three or more AI-stock hyphenated compound modifiers crammed into one sentence.
  why_it_matters: Stacking three or more hyphenated compound modifiers in one sentence is a recognisable AI cadence rather than a deliberate style choice.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - generic_abstraction
  evidence_role: modifier_density
  guidance: Restructure sentences with three or more stock hyphenated compounds; preserve only when the compounds are domain-specific terms of art.
  pattern_number: '18'
  patterns_md_heading: Hyphenated compound modifier overuse
  patterns_md_body: '**Words to watch when clustered:** third-party, cross-functional, client-facing, data-driven, decision-making, well-known, high-quality, real-time, long-term, end-to-end


    Individual hyphenations are often correct, but AI stacks four or five in a single sentence. When you encounter three or more hyphenated compound modifiers in one sentence, restructure to reduce the density.


    **Before:**

    > The cross-functional team delivered a high-quality, data-driven report on our client-facing tools. Their decision-making process was well-known for being thorough and detail-oriented.


    **After:**

    > The team, drawn from several departments, delivered a report grounded in usage data for our client-facing tools. Their process for making decisions was known for being thorough.


    **Severity:** context_warning · `no-compound-modifier-density`


    **Detection:** Programmatic check `no-compound-modifier-density` (added in U1; flags three or more AI-stock hyphenated compounds in a single sentence, drawn from a watchlist of common offenders).'
  patterns_md_leading_blanks: 2
no-copula-avoidance:
  category: Language and grammar
  short_name: Avoiding plain 'is'
  description: Checks for inflated replacements such as serves as, functions as, or stands as.
  why_it_matters: Avoiding plain 'is' often turns simple claims into inflated pseudo-analysis.
  severity: strong_warning
  failure_modes:
  - synthetic_significance
  - generic_abstraction
  evidence_role: grammar_substitution
  guidance: Usually simplify at Balanced and All; recommend preserving if the construction is idiomatic or technical.
  alternatives: 'Constructions that substitute elaborate verbs for "is", "are", or "has". Often the elaborate verb does nothing the simple copula could not.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | serves as | is | Almost always. "X serves as the venue for Y" wants to be "X is the venue for Y". |

    | stands as | is | Same as serves as. |

    | marks | is, was | "X marks the largest Y" wants to be "X is the largest Y". |

    | represents (literal) | is, shows | "X represents an attempt to Y" wants to be "X is an attempt to Y". |

    | boasts | has | "The town boasts three museums" wants to be "The town has three museums". |

    | features | has, includes | "The building features X" wants to be "The building has X". |

    | offers | has, gives | "The role offers flexibility" wants to be "The role has flexible hours" (be specific about what). |'
  pattern_number: '8'
  patterns_md_heading: Copula avoidance
  patterns_md_body: '**Words to watch:** serves as/stands as/marks/represents [a], boasts/features/offers [a]


    Substitutes elaborate constructions for simple "is", "are", or "has".


    **Before:**

    > Gallery 825 serves as LAAA''s exhibition space for contemporary art. The gallery features four separate spaces and boasts over 3,000 square feet.


    **After:**

    > Gallery 825 is LAAA''s exhibition space for contemporary art. The gallery has four rooms totalling 3,000 square feet.


    **Severity:** strong_warning · `no-copula-avoidance`'
  patterns_md_leading_blanks: 2
no-corporate-ai-speak:
  category: Voice and register
  short_name: Corporate AI-speak
  description: Checks for vague delivery, alignment, outcomes, and cross-functional clichés.
  why_it_matters: Corporate AI-speak hides specific work behind vague operational language.
  severity: strong_warning
  failure_modes:
  - generic_abstraction
  evidence_role: domain_cliche
  guidance: Fix at every depth; recommend preserving only when quoting corporate source language.
  pattern_number: '43'
  patterns_md_heading: Corporate AI-speak
  patterns_md_body: '**Words to watch:** "delivering impact", "measurable outcomes", "deliverable outcomes", "scalable, production-grade", "pragmatic approach", "drives outcomes", "cross-functional", "end-to-end (development|delivery|solution)", "translate requirements into outcomes/deliverables/solutions", "stakeholder (alignment|engagement|management)", "actionable insights", "leverage (my|our|the) experience/expertise".


    Generic LinkedIn-AI corporate register. Hides specific work behind operational abstractions: "delivers", "drives", "leverages", "aligns". Often clusters in CVs, capability decks, vendor pitches, and "who we are" pages where the writer wants to sound credible without naming any actual project.


    **Before:**

    > Our cross-functional team leverages decades of expertise to deliver measurable outcomes through end-to-end execution and stakeholder alignment, driving actionable insights for our partners.


    **After:**

    > The team includes designers, engineers, and customer researchers. We worked with three local councils on their tax-collection workflows; the redesign cut average resolution time from 14 days to 6 over six months.


    **Severity:** strong_warning · `no-corporate-ai-speak`


    **Detection:** Programmatic check `no-corporate-ai-speak` (introduced before the 2026-04-08 file-move refactor at 618c723; **strong_warning**).'
  patterns_md_leading_blanks: 2
no-countdown-negation:
  category: Voice and register
  short_name: Countdown negation
  description: Checks for repeated no/not/cannot setups that build toward a reveal.
  why_it_matters: Countdown negation creates a synthetic reveal structure.
  severity: context_warning
  failure_modes:
  - synthetic_significance
  - frictionless_structure
  evidence_role: rhetorical_pattern
  guidance: Fix generic reveal structures; recommend preserving deliberate rhetoric only with strong reason.
  pattern_number: '33'
  patterns_md_heading: Countdown negation
  patterns_md_body: '**Words to watch:** "It wasn''t X. It wasn''t Y. It was Z.", "This isn''t about... This isn''t about... This is about..."


    A multi-sentence rhetorical arc where AI negates two or more things before revealing the actual point, creating false suspense. Distinct from negative parallelism (#9), which is "not X; it''s Y" in a single sentence. This is a sustained dramatic build.


    **Before:**

    > It wasn''t the algorithm. It wasn''t the data. It wasn''t the compute budget. It was the prompt. Three words, chosen carefully, changed everything.


    **After:**

    > The improvement came from rewriting the prompt, not from changes to the model or data. The team had spent weeks on architecture changes before trying this.


    **Before:**

    > This isn''t about technology. This isn''t about efficiency. This is about what it means to be human in an automated world.


    **After:**

    > The automation question is less about the technology itself and more about how it changes the day-to-day work that people build their identity around.


    **Severity:** context_warning · `no-countdown-negation`'
  patterns_md_leading_blanks: 1
no-curly-quotes:
  category: Style
  short_name: Curly quotes
  description: Checks for curly quotation marks when plain output is expected.
  why_it_matters: Curly quotes are not proof of AI, but they matter when the output is expected to be plain cleaned text.
  severity: context_warning
  failure_modes:
  - genre_misfit
  evidence_role: typographic_signal
  guidance: Normalise in All/plain output; recommend preserving in sourced literary or typographic text.
  pattern_number: '17'
  patterns_md_heading: Curly quotation marks
  patterns_md_body: '**Tolerance note:** Curly quotes are typography, not inherently AI writing. Normalise them in hard-mode plain output if requested. Preserve them in sourced excerpts, literary fixtures, publication text, or quoted material.


    ChatGPT uses curly quotes instead of straight quotes.


    **Before:**

    > He said \u201cthe project is on track\u201d but others disagreed.


    **After:**

    > He said "the project is on track" but others disagreed.


    **Severity:** context_warning · `no-curly-quotes`'
  patterns_md_leading_blanks: 2
no-dramatic-transitions:
  category: Structural tells
  short_name: Unearned dramatic transitions
  description: Checks for generic turning points such as something shifted or everything changed.
  why_it_matters: Unearned turning-point language claims drama the prose has not built.
  severity: context_warning
  failure_modes:
  - synthetic_significance
  - genre_misfit
  evidence_role: narrative_template
  guidance: Fix generic turning-point beats; recommend preserving memoir or scene structure when earned.
  pattern_number: '32'
  patterns_md_heading: Dramatic narrative transitions
  patterns_md_body: '**Words to watch:** "Something shifted.", "Everything changed.", "And then, everything clicked.", "That''s when it hit me.", "And that made all the difference."


    Standalone sentences that claim a narrative turning point without earning it. These borrow the structure of memoir writing ("The door opened and my life was never the same") but deploy it for mundane observations. They combine staccato fragments with manufactured insight.


    **Before:**

    > I had been thinking about productivity all wrong. And then, something shifted. I stopped optimising for output and started optimising for energy. Everything changed.


    **After:**

    > I stopped trying to do more in less time and started paying attention to when I had energy and when I did not. The change was not dramatic, but over a few months the difference was obvious in my work.


    **Severity:** context_warning · `no-dramatic-transitions`'
  patterns_md_leading_blanks: 2
no-em-dashes:
  category: Style
  short_name: Em dashes
  description: Checks for em dash punctuation, a strong current AI-style signal in this skill.
  why_it_matters: Em dashes are now a strong style fingerprint in generated prose, especially when they appear as default punctuation.
  severity: strong_warning
  failure_modes:
  - genre_misfit
  evidence_role: punctuation_signal
  guidance: Treat as a strong 2026 AI-style signal. May be preserved only at Balanced depth with explicit disclosure; All requires removal.
  alternatives: 'In publication-ready plain prose, em dashes are now a strong AI signal. Density is the giveaway: a writer using one or two intentionally is fine; a piece with em dashes in every other paragraph reads as machine-flavoured even when each individual use is grammatical.


    Most em dashes are doing the job of a different punctuation mark. The right replacement depends on what the dash was actually doing.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | Em dash between two independent clauses | A period or semicolon | Period if both halves carry weight. Semicolon if the two clauses are independent and the relationship is real. |

    | Em dash setting off an aside | A comma or parentheses | Parentheses if the aside could be cut without losing the sentence. Comma if it could not. |

    | Em dash introducing a list or explanation | A colon | "X, and here is what X means" is colon work. |

    | Em dash separating a beat or shift | A comma | The most common case. Try the comma first. |

    | Em dash that fits none of the above | A sentence with bad structure | Rewrite. |'
  pattern_number: '49'
  patterns_md_heading: Em dashes
  patterns_md_body: 'ChatGPT and similar systems use the em dash (`—`) as default mid-sentence punctuation where most human writers would use a comma, a semicolon, a period, or a parenthetical pair of dashes. A single em dash reads naturally; routine em dashes in plain web prose are a strong 2026 AI-style fingerprint.


    **Tolerance note:** Em dashes are legitimate punctuation in literary prose, narrative voice, and publication-ready formatting where they are part of an author''s deliberate style. Treat them as a strong AI-style signal in plain web prose, technical writing, instructional reference, and policy briefs. Preserve only when the source genuinely uses them stylistically and the preservation is disclosed.


    **Before:**

    > The framework offers a unified approach — one that combines flexibility with rigour — and integrates with existing tooling without friction.


    **After:**

    > The framework combines flexibility with rigour, and it integrates with existing tooling without friction.


    **Severity:** strong_warning · `no-em-dashes`


    **Detection:** Programmatic check `no-em-dashes` (in the catalogue since the initial release at e68bc3d on 2026-04-01; **strong_warning**). Counts U+2014 occurrences and fails on any. Distinct from #17 curly quotes (a typographic substitution at the quotation-mark level); this check targets the long-dash glyph as default mid-sentence punctuation.'
  patterns_md_leading_blanks: 2
no-excessive-hedging:
  category: Filler and hedging
  short_name: Excessive hedging
  description: Checks for evasive qualification and impersonal uncertainty.
  why_it_matters: Too much hedging weakens stance and can make prose feel evasive or machine-neutral.
  severity: context_warning
  failure_modes:
  - voice_erasure
  evidence_role: stance_erasure
  guidance: Fix evasive hedging; recommend preserving scientific qualification and honest uncertainty.
  alternatives: 'Stacking three or more qualifiers on a single claim until the sentence commits to nothing. The fix is rarely to find a less hedgy word; it is to drop the hedges and let the claim stand or fall on its own.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | could potentially possibly | might, could | Pick one qualifier or none. Three is meaningless. |

    | It could be argued that | (just argue it) | If the writer thinks X, they should claim X. |

    | It might be the case that | maybe, possibly | One word, not five. |

    | seems to suggest | suggests, hints at | "Seems to" almost always cuts cleanly. |

    | there is some evidence that may indicate | the evidence shows, the evidence is mixed | Either claim it or admit the evidence is mixed. The hedge stack disguises uncertainty as caution. |

    | it is worth considering whether | (just consider it) | If it is worth considering, the writer can do the considering on the page. |'
  pattern_number: '23'
  patterns_md_heading: Excessive hedging
  patterns_md_body: 'Over-qualifying statements to the point where the sentence commits to nothing.


    **Before:**

    > It could potentially possibly be argued that the policy might have some effect on outcomes.


    **After:**

    > The policy may affect outcomes.


    **Severity:** context_warning · `no-excessive-hedging`'
  patterns_md_leading_blanks: 2
no-excessive-lists:
  category: Structural tells
  short_name: Excessive list formatting
  description: Checks whether prose has been over-converted into bullets or numbered lists.
  why_it_matters: Too much list formatting can make prose feel like generated notes or slides.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: listification
  guidance: Fix unnecessary listification; recommend preserving reference, instructional, or interview structure.
  pattern_number: '31'
  patterns_md_heading: Excessive list-making
  patterns_md_body: 'AI converts prose to bullet points when the content does not warrant it. This is driven by RLHF training: human raters reward structured-looking answers, so the model learns that bullets = quality. The result is text that looks organised but reads like a slide deck rather than writing.


    When you encounter unnecessary bullet points or numbered lists, fold the content back into prose. Lists are appropriate for genuinely discrete items (ingredients, steps, specifications). They are not appropriate for flowing arguments, observations, or narrative.


    **Severity:** context_warning · `no-excessive-lists`'
  patterns_md_leading_blanks: 2
no-false-concession-hedges:
  category: Filler and hedging
  short_name: False balance or concession
  description: Checks for fake both-sides framing that avoids taking a position.
  why_it_matters: False balance can hide the writer's actual position.
  severity: strong_warning
  failure_modes:
  - voice_erasure
  evidence_role: stance_erasure
  guidance: Fix fake both-sides framing at Balanced and All; preserve only if the piece actually argues both positions with evidence.
  alternatives: 'Performing balance by staging two generic positions and landing in the middle. Real nuance names the evidence and stakes; false concession just balances abstractions.


    The middle column names what the writer was trying to do. Substitution does not work; the rewrite has to drop the staged debate and make a direct claim.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | While critics argue X, supporters say Y | The writer wants to avoid taking a position | Pick a position, support it. The staged debate is performative. |

    | The truth lies somewhere in the middle | The writer has not committed to a claim | Either name the actual middle position with evidence, or drop the framing and pick a side. |

    | Both sides have valid points | Same as above | If both sides have valid points, name which points and on what evidence. |

    | It depends on context | (when used to dodge) | Acceptable when the dependence is named. Empty when "it depends" is the whole answer. |

    | There are merits and drawbacks to both | The writer is dodging | Same as above. List the actual merits and drawbacks. |

    | On the one hand X, on the other hand Y | The writer is staging a debate without picking | Pick the side the evidence supports, or admit the question is genuinely open and name what would settle it. |'
  pattern_number: 23a
  patterns_md_heading: False concession hedges
  patterns_md_body: '**Words to watch:** "While critics argue..., supporters say...", "the truth lies somewhere in the middle", "both sides have valid points", "it depends on context" when used to avoid a claim.


    AI often performs nuance by staging two generic positions and then landing in a bland middle. Real nuance names the evidence, stakes, and tradeoffs. If the sentence only balances abstractions, rewrite it as a direct claim.


    **Before:**

    > While critics argue remote work weakens culture, supporters say it improves flexibility. The truth lies somewhere in the middle.


    **After:**

    > Remote work improves flexibility for most desk workers, but it exposes weak management habits that office routines used to hide.


    **Severity:** strong_warning · `no-false-concession-hedges`'
  patterns_md_leading_blanks: 1
no-filler-phrases:
  category: Filler and hedging
  short_name: Filler phrases
  description: Checks for stock padding such as in order to or it is worth noting.
  why_it_matters: Filler phrases add polish without information.
  severity: strong_warning
  failure_modes:
  - generic_abstraction
  evidence_role: filler_phrase
  guidance: Fix stock filler at Balanced and All; at Balanced, disclose and remove unless it belongs to quoted or intentionally casual voice.
  alternatives: 'Multi-word constructions that compress to one or two words, or cut entirely. Filler is the easiest tell to remove because the meaning rarely depends on it.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | in order to | to | Always. "In order to" never adds anything. |

    | due to the fact that | because | Always. |

    | at this point in time | now, today, currently | Pick the one that fits the tense. |

    | in the event that | if | Always. |

    | has the ability to | can | Always. |

    | it is important to note that | (cut the whole phrase) | The next clause should make its own importance evident. |

    | at the end of the day | (cut entirely; or state the actual conclusion) | Adds nothing. |

    | from a broader perspective | (cut, or name the perspective) | Vague gesture. Either name the wider context or drop it. |

    | generally / broadly speaking | usually, often, mostly | Or cut. |'
  pattern_number: '22'
  patterns_md_heading: Filler phrases
  patterns_md_body: 'Common substitutions:

    - "In order to achieve this goal" -> "To achieve this"

    - "Due to the fact that it was raining" -> "Because it was raining"

    - "At this point in time" -> "Now"

    - "In the event that you need help" -> "If you need help"

    - "The system has the ability to process" -> "The system can process"

    - "It is important to note that the data shows" -> "The data shows"

    - "In today''s fast-paced world" -> cut entirely

    - "As technology continues to evolve" -> cut entirely

    - "At the end of the day" -> cut or replace with specific conclusion

    - "Generally speaking" -> "Usually" or cut

    - "Broadly speaking" -> "Overall" or cut

    - "From a broader perspective" -> cut or state the perspective directly


    **Severity:** strong_warning · `no-filler-phrases`'
  patterns_md_leading_blanks: 1
no-forced-triads:
  category: Language and grammar
  short_name: Decorative three-part lists
  description: Checks for forced triads used as rhythm rather than substance.
  why_it_matters: Decorative three-part lists can create artificial rhythm without substance.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: list_rhythm
  guidance: Fix decorative triads; recommend preserving meaningful lists and deliberate rhetoric.
  pattern_number: '10'
  patterns_md_heading: Rule of three
  patterns_md_body: 'Ideas forced into groups of three to appear comprehensive, even when the items do not naturally form a triad.


    **Tolerance note:** Three-part structures are common in human rhetoric, comedy, fiction, speeches, and criticism. Treat this as an AI tell when triads cluster densely, feel interchangeable, or use abstract nouns to simulate breadth. Preserve when the three items are concrete, necessary, funny, rhythmic, or part of a voiced argument.


    **Before:**

    > The event features keynote sessions, panel discussions, and networking opportunities. Attendees can expect innovation, inspiration, and industry insights.


    **After:**

    > The event includes talks and panels, with time for informal networking between sessions.


    **Severity:** context_warning · `no-forced-triads` (the density variant lives at #10a)'
  patterns_md_leading_blanks: 2
no-formulaic-openers:
  category: Filler and hedging
  short_name: Formulaic openers
  description: Checks for generated openings such as at its core or from a broader perspective.
  why_it_matters: Formulaic openings make paragraphs feel assembled from templates.
  severity: strong_warning
  failure_modes:
  - frictionless_structure
  - generic_abstraction
  evidence_role: formulaic_structure
  guidance: Fix at Balanced and All; at Balanced, recommend preserving only if it matches the source genre.
  alternatives: 'Standard AI-essay opening patterns that signal the piece was generated rather than written. The first sentence often gives the game away.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | In today''s fast-paced world | (cut entirely; start with the actual subject) | The world is not the subject of the piece. |

    | As technology continues to evolve | (cut; start with the actual claim) | Time and progress are not arguments. |

    | In an era of (X) | (cut; or name a specific year) | Vague historical framing. Pin to a date or remove. |

    | In recent years | recently, since (year), in the past (n) years | If recent matters, pick a specific window. |

    | Throughout history | (almost always cut) | Rarely true. The claim usually applies to a much narrower window. |

    | It is no secret that | (cut entirely) | If everyone knows, the writer has not earned the sentence. |

    | Many people believe / It is widely known | (name the people, or drop the claim) | Vague attribution. |

    | Imagine a world where | (cut; just describe the situation) | Hypothetical-opener cliché. |'
  pattern_number: '50'
  patterns_md_heading: Formulaic openers
  patterns_md_body: '**Words to watch:** "At its core,", "At a foundational/fundamental/practical level,", "Beyond this/that/[abstract noun],", "There is also a [\…] dimension/aspect/element,", "It is worth recognising/noting/mentioning,", "From a [\…] perspective/standpoint,", "On a [\…] level,", "In a broader/wider/larger/similar context/sense/vein,", "Perhaps most importantly/significantly/notably/crucially,", "What makes this particularly/especially/uniquely [\…]"


    Generated paragraph openers that frame the next bit as a step up in abstraction. They survive rewrites because they are bland connectives rather than vocabulary tells, but they mark prose that stitches paragraphs together with the same handful of moves.


    **Before:**

    > At its core, the proposal is about consolidation. From a broader perspective, it reduces operational overhead. Perhaps most importantly, it aligns with the strategic plan.


    **After:**

    > The proposal consolidates three legacy tools into one, which reduces integration points and on-call rotations. It is also the move the strategic plan has been pointing at since 2025.


    **Severity:** strong_warning · `no-formulaic-openers`


    **Detection:** Programmatic check `no-formulaic-openers` (added in PR #1 at ee05591 on 2026-04-01; **strong_warning**). Anchored regex against the first line of each paragraph; flags any paragraph whose opener fits the formulaic-opener template. Distinct from #7 AI vocabulary words (which lists opener phrases as one sub-bullet under the broader vocabulary check) and from #47 soft scaffolding (which catches between-sentence connectives like "One useful area..." rather than paragraph-opening abstractions).'
  patterns_md_leading_blanks: 2
no-generic-conclusions:
  category: Filler and hedging
  short_name: Generic conclusion
  description: Checks for empty endings such as the future looks bright.
  why_it_matters: Generic conclusions make the ending feel templated and interchangeable.
  severity: hard_fail
  failure_modes:
  - provenance_residue
  - synthetic_significance
  evidence_role: generic_closure
  guidance: Fix at every depth unless quoted from source text.
  alternatives: 'Vague upbeat endings that could be appended to any article. The fix is to replace with a specific fact, observation, or claim.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | The future looks bright | (replace with a specific plan, statistic, or expectation) | Generic optimism. Name what specifically looks bright and why. |

    | Exciting times lie ahead | (replace with a specific upcoming event or development) | Same. |

    | This represents a step in the right direction | (claim the specific improvement) | "Right direction" is a placeholder. Say what improved and how. |

    | The journey continues | (cut entirely, or name the next stage) | Empty rhetorical close. |

    | Only time will tell | (replace with a specific question or test) | Hedged optimism. Name the unresolved question. |

    | Continues to thrive | (state the specific evidence of thriving) | Empty without numbers or examples. |'
  pattern_number: '24'
  patterns_md_heading: Generic positive conclusions
  patterns_md_body: 'Vague upbeat endings that could be appended to any article on any topic.


    **Before:**

    > The future looks bright for the company. Exciting times lie ahead as they continue their journey toward excellence. This represents a major step in the right direction.


    **After:**

    > The company plans to open two more locations next year, both in the southeast.


    **Severity:** hard_fail · `no-generic-conclusions`'
  patterns_md_leading_blanks: 2
no-ghost-spectral-density:
  category: Sensory and atmospheric
  short_name: Ghost/spectral atmosphere
  description: Checks for clichéd ghost, shadow, whisper, and echo language.
  why_it_matters: Stock spectral language can make atmosphere feel generated or borrowed.
  severity: context_warning
  failure_modes:
  - generic_abstraction
  - genre_misfit
  evidence_role: atmospheric_cliche
  guidance: Fix atmospheric filler; recommend preserving gothic, literary, or quoted prose.
  pattern_number: '26'
  patterns_md_heading: Ghost/spectral language
  patterns_md_body: '**Words to watch:** ghost(s), spectral, shadow(s), whisper(s), echo(es), phantom, haunting/haunted, lingering, remnant(s), trace(s) used atmospherically, unspoken, hidden (when inflating the significance of something ordinary)


    AI defaults to spectral, ghostly, shadowy imagery for anything it wants to make feel deep. Everything becomes a shadow, a memory, a whisper, or an echo. One "ghost" is fine. Four in two paragraphs is a tell.


    **Before:**

    > The pebbles carry the ghosts of the boulders they were, resting in a quiet space between the earth and the sea. Each one is a whisper from a vanished landscape, an echo of forces that shaped the coastline.


    **After:**

    > The pebbles are fragments of larger rocks, broken down over centuries by water and weather. They collect in the spaces between tide lines where the current drops them.


    **Severity:** context_warning · `no-ghost-spectral-density`'
  patterns_md_leading_blanks: 1
no-inline-header-lists:
  category: Style
  short_name: Inline-header lists
  description: Checks for list items that begin with a bolded header and colon, turning prose into a slide deck.
  why_it_matters: Bolded-header list items convert prose into slide-deck shapes, a strong frictionless-structure tell.
  severity: strong_warning
  failure_modes:
  - frictionless_structure
  - generic_abstraction
  evidence_role: list_template
  guidance: Fix at Balanced and All; fold bolded-header bullets back into prose unless the format is a real spec or reference list.
  pattern_number: '14'
  patterns_md_heading: Inline-header lists
  patterns_md_body: 'List items start with bolded headers followed by colons, turning prose into a slide deck.


    **Before:**

    > - **User Experience:** The user experience has been significantly improved with a new interface.

    > - **Performance:** Performance has been enhanced through optimised algorithms.

    > - **Security:** Security has been strengthened with end-to-end encryption.


    **After:**

    > The update improves the interface, speeds up load times through optimised algorithms, and adds end-to-end encryption.


    **Severity:** strong_warning · `no-inline-header-lists`


    **Detection:** Programmatic check `no-inline-header-lists` (added in U1; flags two or more list items beginning with a bolded header and colon).'
  patterns_md_leading_blanks: 2
no-knowledge-cutoff-disclaimers:
  category: Communication
  short_name: Knowledge-cutoff disclaimers
  description: Checks for AI training-update or limited-information hedges left in the prose.
  why_it_matters: AI training-update and limited-information hedges are model meta-residue and almost never belong in finished prose.
  severity: strong_warning
  failure_modes:
  - provenance_residue
  evidence_role: model_meta_residue
  guidance: Fix at every depth; training-update and limited-information hedges are model meta-residue, not authorial uncertainty.
  alternatives: 'AI hedges about its own training data left in published text. The fix is either to find the actual information or to cut the disclaimer.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | As of (date) | (cut, or replace with a specific date and source) | Often left over from prompts asking the model what it knows. |

    | Up to my last training update | (cut) | Pure model artefact. |

    | While specific details are (limited / scarce / not extensively documented) | (find the details, or rewrite the sentence to make a different claim) | If the writer cannot find the detail, the sentence should not pretend to. |

    | Based on available information | (cut, or name the source) | Vague hedge. |

    | It appears that | (claim it, or hedge with a specific reason) | "It appears that" with no follow-up evidence is empty. |'
  pattern_number: '20'
  patterns_md_heading: Knowledge-cutoff disclaimers
  patterns_md_body: '**Words to watch:** as of [date], Up to my last training update, While specific details are limited/scarce..., based on available information...


    AI disclaimers about incomplete information left in the text.


    **Before:**

    > While specific details about the company''s founding are not extensively documented in readily available sources, it appears to have been established sometime in the 1990s.


    **After:**

    > The company was founded in 1994, according to its registration documents.


    **Severity:** strong_warning · `no-knowledge-cutoff-disclaimers`


    **Detection:** Programmatic check `no-knowledge-cutoff-disclaimers` (added in U1). Note that this does not fold into `no-collaborative-artifacts` — that check covers chat residue ("I hope this helps", "great question") but not training-update or limited-information hedges.'
  patterns_md_leading_blanks: 2
no-manufactured-insight:
  category: Structural tells
  short_name: Manufactured insight framing
  description: Checks for phrases that perform hidden depth or secret significance without earning it.
  why_it_matters: Manufactured insight framing performs depth without adding specific evidence or thought.
  severity: strong_warning
  failure_modes:
  - synthetic_significance
  evidence_role: rhetorical_pattern
  guidance: Fix at Balanced and All; at Balanced, recommend preserving only if it clearly belongs to the writer's voice.
  alternatives: 'Phrases that promise revelation without doing the evidentiary work. They include false revelation ("the real answer is"), contrived contrarianism ("what nobody is talking about"), and privileged perception ("when no one was watching").


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | The real X is | (claim X directly without the "real" frame) | If the writer has the real answer, they can just state it. |

    | Here''s what''s really happening | (state what is happening) | The "really" is doing nothing. |

    | What nobody is talking about | (cite a specific source for the silence, or drop) | Almost always false. Many people talk about most things. |

    | Contrary to popular belief | (name the belief and source it; or drop) | If the popular belief is real, name it specifically. |

    | The uncomfortable truth | (state the truth without the framing) | The framing inflates ordinary claims. |

    | What gets lost in the conversation | (state what is missing, with evidence) | Often manufactured. |

    | When no one was watching | (cut; the writer probably was not there) | Privileged-perception cliché. |

    | Without anyone noticing | (cut) | Same. |

    | The shift nobody noticed | (cut, or name the shift and source the silence) | Same. |'
  pattern_number: '42'
  patterns_md_heading: Manufactured insight framing
  patterns_md_body: '**Words to watch:** "what''s really", "the real answer", "here''s what''s really", "the real story is", "what''s actually happening", "contrary to popular belief", "the uncomfortable truth", "what nobody is talking about", "what no one seems to realise", "what most people miss", "what (no one|nobody) noticed", "before anyone noticed", "without anyone noticing", "let that sink in", "read that again", "if you know, you know", "and that changes everything", "the real insight/challenge/takeaway/kicker/question", "a quiet/powerful/important/profound lesson", "sometimes the bravest/hardest/most important", "this isn''t X. it''s Y.", "that''s not X. that''s Y.", "the honest answer is", "here''s the honest (answer|framing|truth)", "here''s the (real) truth", "the real truth is", "if I''m being honest", "in all honesty", "to be (perfectly) honest,"


    Performs revelation through phrasing — claims hidden depth or secret significance without doing the evidentiary work. Includes "the real X?" rhetorical questions, performed knowingness ("read that again", "let that sink in"), pseudo-profundity ("quietly revolutionary", "the quiet part"), formulaic depth framing ("here''s the thing", "the reason is straightforward"), and contrived contrast that reveals an inflated abstract payload. Also includes **performed candour** — honesty/truth framing ("the honest answer is", "here''s the real truth", "if I''m being honest", "in all honesty") that dresses an ordinary statement as a hard-won admission.


    **Before:**

    > Most people think project management is about tracking tasks. Here''s the real insight: it''s about managing attention. What nobody is talking about is that most projects fail because no one was watching the right thing. Let that sink in.


    **After:**

    > Most projects fail because the project manager loses track of which decisions are still open. The Q3 launch slipped because three blocking decisions sat on someone''s desk for two weeks before anyone surfaced them.


    **Severity:** strong_warning · `no-manufactured-insight`


    **Detection:** Programmatic check `no-manufactured-insight` (introduced before the 2026-04-08 file-move refactor at 618c723; **strong_warning**). Closely related to #9 contrived contrast — manufactured insight framing is the *content* of the false reveal; #9 is the *syntactic shape*. A piece can carry one without the other but they often co-occur.


    **Hypothesis (performed candour):** The honesty/truth-framing phrases ("the honest answer is", "here''s the real truth", "if I''m being honest") are folded into `no-manufactured-insight` rather than promoted to their own numbered entry. They share the same generative move as the rest of #42 (claiming significance through phrasing rather than earning it), so a single check captures the family. Promote to a sibling entry if either signal lands: the candour regex set grows materially beyond the current handful of phrases, or audit failures cluster on candour without co-occurring with the rest of #42''s mechanisms. Until then, keep folded.'
  patterns_md_leading_blanks: 2
no-markdown-headings:
  category: Style
  short_name: Headings in prose
  description: Checks for markdown headings and plain title headings when prose should flow.
  why_it_matters: Headings can make prose feel packaged by an assistant rather than written as a continuous piece.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: formatting_signal
  guidance: Fix markdown headings and plain title headings when prose should flow; recommend preserving web articles, guides, and reference docs.
no-negation-density:
  category: Filler and hedging
  short_name: Dense negation
  description: Checks whether negation markers are unusually dense across prose.
  why_it_matters: Dense negation can make a piece feel over-framed around what it is not instead of what it is.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: rhetorical_density
  guidance: Review dense negation as a style signal; preserve polemic or technical qualification when purposeful.
  pattern_number: '48'
  patterns_md_heading: Dense negation
  patterns_md_body: '**Words to watch:** clusters of "is not", "are not", "was not", "were not", "does not", "do not", "isn''t", "aren''t", "wasn''t", "weren''t", "doesn''t", "don''t", "not merely", "not simply", "not just" — across longer prose, not in a single sentence.


    Distinct from #9 (contrived contrast in a single sentence) and #33 (countdown negation across two or three consecutive sentences). This is sustained negation density across a piece: a draft that defines itself by what it isn''t, paragraph after paragraph. The check activates only on prose of 300+ words to avoid penalising short polemics where dense negation is the deliberate rhetorical move.


    **Before:**

    > The model isn''t trying to imitate writing. It isn''t merely fitting a template. It isn''t just generating tokens. It''s not really thinking, but it''s also not just predicting next word. The output isn''t original, but it isn''t copied either. The system isn''t conscious, but it isn''t a simple lookup either. None of this is what most people assume.


    **After:**

    > The model is doing pattern completion at very large scale, with no internal model of meaning. The output looks like writing because the training data is writing, not because the system understands anything. Treat the result as a draft, not a thought.


    **Severity:** context_warning · `no-negation-density`


    **Detection:** Programmatic check `no-negation-density` (added in 9ce1cec on 2026-04-27 as part of the AI-writing-signal framework expansion). Triggers only on prose of 300+ words.'
  patterns_md_leading_blanks: 2
no-negative-parallelisms:
  category: Language and grammar
  short_name: Contrived contrast
  description: Checks for not-X-but-Y, beyond-X, less-X-than-Y, and related reveal structures.
  why_it_matters: Contrived contrast creates a fake reveal instead of making a direct, supported claim.
  severity: strong_warning
  failure_modes:
  - synthetic_significance
  evidence_role: rhetorical_pattern
  guidance: Fix contrived reframes at Balanced and All; recommend preserving only purposeful contrast at Balanced.
  alternatives: 'The "not just X, it''s Y" construction and its variants. The problem is structural: a flat interpretation gets dismissed so an inflated abstraction can arrive with fake depth. Substitution does not fix this. The rewrite has to drop the contrast altogether and make a direct claim.


    The middle column names what the writer was *trying* to say. The Notes column says how to rewrite.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | It''s not X, it''s Y | The writer wants to claim Y but has not supported it | Pick Y, support it with evidence, drop the rejection of X. |

    | It''s Y, not X | Same as above | Reversing the order does not change the construction. |

    | Less X than Y | The writer wants to claim Y but has hedged with the comparison | "Less interesting than important" wants to be "important, because…". |

    | More Y than X | Same as Less X than Y | Same construction, opposite framing. |

    | Not so much X as Y | Same as above | The "as much" softening adds nothing. |

    | Beyond X, it is Y | The writer wants Y to be the subject | "Beyond grief, it becomes a meditation on belonging" wants to be "The film is about how belonging changes after a death." |

    | You might think X. Actually, Y | The writer wants to claim Y but has manufactured suspense | Just claim Y. The reader was not thinking X. |

    | No X. No Y. Just Z | The writer wants to state Z dramatically | State Z directly. The negation series performs depth without earning it. |


    ### When the contrast is real


    Not every contrast is contrived. A concrete distinction between two specific things ("the laptop is powerful, not cheap") is doing real work. Two named positions in genuine tension ("the problem is not collaboration, the problem is performative attendance") can carry an argument.


    The tell is the *inflated reveal*: the second half of the contrast is an abstract noun (meaning, identity, humanity, trust, belonging, connection) that the writer has not actually argued for. If the Y side is concrete and supported, the contrast is probably fine. If the Y side is an abstract payload, rewrite it as a direct claim.'
  pattern_number: '9'
  patterns_md_heading: Contrived contrast / negative parallelism
  patterns_md_body: 'Constructions like "Not only...but..." or "It''s not just about..., it''s..." are overused to the point of being a reliable AI fingerprint. Treat this as a rhetorical move, not a string pattern: the problem is the fake reframe where a simple idea is rejected so a grander, more abstract idea can be revealed.


    Agents often dodge the rule by flipping the syntax around. These are the same tell:


    - "It''s not X, it''s Y."

    - "It''s Y, not X."

    - "Less X than Y."

    - "More Y than X."

    - "Not so much X as Y."

    - "Beyond X, it is Y."

    - "You might think X. Actually, Y."

    - "No X. No Y. Just Z."


    Do not preserve the structure by swapping words, reversing the order, replacing "not" with "beyond", or splitting the contrast across sentences. If the sentence works by first rejecting a flat interpretation and then unveiling a supposedly deeper one, rewrite it as a direct claim with evidence.


    **Tolerance note:** Not every contrast is a problem. "The laptop is powerful, not cheap" is a concrete distinction. "The problem is not collaboration. The problem is performative attendance" can be a real argument. The tell is the inflated reveal: a plain interpretation is dismissed so an abstract payload ("meaning", "identity", "humanity", "trust", "belonging") can arrive with fake depth.


    **Before:**

    > It''s not just about the beat riding under the vocals; it''s part of the aggression and atmosphere. It''s not merely a song, it''s a statement.


    **After:**

    > The heavy beat adds to the aggressive tone throughout the track.


    **Before:**

    > The film is a negotiation with memory, not just a family story. Beyond grief, it becomes a meditation on what it means to belong.


    **After:**

    > The film uses family conflict and remembered details to show how belonging changes after someone dies.


    **Before:**

    > You might think the app is about saving time. Actually, it is about trust.


    **After:**

    > The app earns trust by showing exactly what changed and letting users undo each step.


    **Severity:** strong_warning · `no-negative-parallelisms`'
  patterns_md_leading_blanks: 2
no-nonliteral-land-surface:
  category: Voice and register
  short_name: Nonliteral land/surface phrasing
  description: Checks for abstract uses such as ideas landing, concerns surfacing, or work landing on a scale.
  why_it_matters: Abstract land/surface phrasing often makes ordinary ideas sound artificially managed or packaged.
  severity: strong_warning
  failure_modes:
  - generic_abstraction
  - synthetic_significance
  evidence_role: metaphor_residue
  guidance: Fix nonliteral land/surface phrasing; replace with the concrete action or claim.
  pattern_number: '45'
  patterns_md_heading: Nonliteral land/surface phrasing
  patterns_md_body: '**Words to watch:** "the argument lands", "the idea lands", "your point lands", "where my draft landed", "lands with the reader/audience/team/stakeholders", "lands in the rubric/scale/category", "surfaces in the conversation/discussion/debate/work/writing", "what surfaces", "what surfaced".


    Treats abstract ideas as physical objects that land or surface. Often used to make ordinary feedback or analysis sound managed or packaged. Distinct from #30 generic metaphors (which is about reaching for plausible-but-unanchored figurative language) — this is a specific stock cliché shape: noun + lands / surfaces.


    **Before:**

    > The argument lands somewhere between cautious optimism and quiet despair. What surfaces in the discussion is a recognition that no clean answer exists.


    **After:**

    > The argument is cautious — the writer thinks the policy will work but is not willing to predict by how much. Three of the seven examples she cites support the optimistic reading; the other four are ambiguous.


    **Severity:** strong_warning · `no-nonliteral-land-surface`


    **Detection:** Programmatic check `no-nonliteral-land-surface` (added in 1422bad on 2026-04-27 during a hard-mode calibration pass; **strong_warning**).'
  patterns_md_leading_blanks: 2
no-notability-claims:
  category: Content patterns
  short_name: Notability claims
  description: Checks for fake-prestige framing such as active social media presence or coverage by unnamed major outlets.
  why_it_matters: Listing unnamed authorities or follower counts as if the mention itself were the story performs prestige instead of reporting it.
  severity: strong_warning
  failure_modes:
  - synthetic_significance
  - generic_abstraction
  evidence_role: notability_inflation
  guidance: Fix at Balanced and All; replace abstract notability claims with named sources or remove the framing.
  pattern_number: '2'
  patterns_md_heading: Notability claims
  patterns_md_body: '**Words to watch:** independent coverage, local/regional/national media outlets, written by a leading expert, active social media presence


    Asserts notability by listing sources without context, as though the mention itself is the story.


    **Before:**

    > Her views have been cited in The New York Times, BBC, Financial Times, and The Hindu. She maintains an active social media presence with over 500,000 followers.


    **After:**

    > In a 2024 New York Times interview, she argued that AI regulation should focus on outcomes rather than methods.


    **Severity:** strong_warning · `no-notability-claims`


    **Detection:** Programmatic check `no-notability-claims` (added in U1 of the audit-report redesign).'
  patterns_md_leading_blanks: 2
no-orphaned-demonstratives:
  category: Voice and register
  short_name: Vague 'this/that' starts
  description: Checks for repeated vague sentence subjects such as This highlights or That shows.
  why_it_matters: Vague this/that openings blur the actual subject and create generic analysis.
  severity: context_warning
  failure_modes:
  - voice_erasure
  - generic_abstraction
  evidence_role: sentence_subject
  guidance: Review repeated 'This/That highlights...' starts; replace vague subjects with concrete nouns when the antecedent is unclear.
  pattern_number: 35a
  patterns_md_heading: Orphaned demonstratives
  patterns_md_body: '**Words to watch:** "This highlights...", "This underscores...", "This demonstrates...", "That speaks to...", "These point to..."


    The problem is not the word "this"; it is the vague subject. If "this" points to a whole previous paragraph, replace it with the actual noun or claim.


    **Before:**

    > The team missed the deadline and the launch slipped by three weeks. This highlights the importance of communication.


    **After:**

    > The missed deadline exposed a communication gap between product and engineering.


    **Severity:** context_warning · `no-orphaned-demonstratives` (the related sentence-start chain check lives at #35b)'
  patterns_md_leading_blanks: 1
no-placeholder-residue:
  category: Voice and register
  short_name: Placeholder residue
  description: Checks for unfilled template markers and placeholder instructions.
  why_it_matters: Placeholder residue signals unfinished generated or templated text.
  severity: hard_fail
  failure_modes:
  - provenance_residue
  evidence_role: template_residue
  guidance: Fix at every depth; unfilled placeholders are generated/template residue.
  pattern_number: '39'
  patterns_md_heading: Template and placeholder residue
  patterns_md_body: '**Words to watch:** `{client_name}`, `[Company Name]`, `[insert date]`, `<source>`, "Hi {name}".


    Unfilled placeholders are not style issues; they are generated/template residue. Replace them with real values if known, or remove the surrounding sentence if not.


    **Severity:** hard_fail · `no-placeholder-residue`'
  patterns_md_leading_blanks: 1
no-promotional-language:
  category: Content patterns
  short_name: Generic promotional language
  description: Checks for stock hype and sales-like adjectives.
  why_it_matters: Stock hype weakens credibility and often appears in generated product or venue copy.
  severity: context_warning
  failure_modes:
  - generic_abstraction
  - synthetic_significance
  evidence_role: hype_language
  guidance: Fix generic hype; recommend preserving quoted marketing copy or voiced enthusiasm.
  pattern_number: '4'
  patterns_md_heading: Promotional language
  patterns_md_body: '**Words to watch:** boasts a, vibrant, rich (figurative), profound, enhancing its, showcasing, exemplifies, commitment to, natural beauty, nestled, in the heart of, groundbreaking (figurative), renowned, breathtaking, must-visit, stunning


    Reads like tourism marketing rather than description.


    **Before:**

    > Nestled within the breathtaking region of Gonder in Ethiopia, Alamata Raya Kobo stands as a vibrant town with a rich cultural heritage and stunning natural beauty.


    **After:**

    > Alamata Raya Kobo is a town in the Gonder region of Ethiopia, known for its weekly market and 18th-century church.


    **Severity:** context_warning · `no-promotional-language`'
  patterns_md_leading_blanks: 2
no-quietness-obsession:
  category: Sensory and atmospheric
  short_name: Generic quiet/still mood
  description: Checks for overused quiet, still, soft, and hushed atmosphere.
  why_it_matters: Overused quiet/still mood language can create generic literary atmosphere.
  severity: context_warning
  failure_modes:
  - synthetic_significance
  - genre_misfit
  evidence_role: atmospheric_cliche
  guidance: Fix generic quietness mood; recommend preserving if quietness is the actual subject or voice.
  pattern_number: '27'
  patterns_md_heading: Quietness obsession
  patterns_md_body: '**Words to watch:** quiet/quietly, silent/silently, softly, hum/humming, stillness, gentle, hushed, murmur, settle/settled, tender


    AI inserts quietness and softness where it does not belong, often against the logic of the scene. In a 759-word essay about pebbles, one AI used "quiet" ten times. The word has become a proxy for depth.


    Adjacent manufactured-insight frames include "when no one noticed", "the shift nobody noticed", "before anyone noticed", and "without anyone noticing". These usually imply privileged perception without doing the evidentiary work.


    **Before:**

    > There is a quiet beauty in the way the morning light settles on the table. The coffee hums softly in its cup. Outside, the world has a gentle stillness to it, as if holding its breath.


    **After:**

    > The morning light was on the table. The coffee was getting cold. Outside, a truck reversed into the loading bay and someone dropped a crate.


    **Severity:** context_warning · `no-quietness-obsession`'
  patterns_md_leading_blanks: 2
no-rhetorical-questions:
  category: Structural tells
  short_name: Template rhetorical questions
  description: Checks for article-style questions followed by obvious answers.
  why_it_matters: Template questions often simulate engagement without adding real inquiry.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: rhetorical_template
  guidance: Fix article-template questions; recommend preserving interviews, teaching prose, or deliberate argument.
  pattern_number: '29'
  patterns_md_heading: Mid-sentence rhetorical questions
  patterns_md_body: 'Short questions dropped mid-paragraph as a pacing device, followed by a declarative answer. Borrowed from long-form journalism but deployed indiscriminately. Includes the "The real X?" pattern: "The real insight?", "The real challenge?", "The takeaway?", "The kicker?" These perform revelation through question format.


    **Tolerance note:** Interviews, teaching prose, polemic, and comic essays often use questions legitimately. Treat as an AI tell when the answer is immediate, generic, and framed as revelation.


    **Before:**

    > But now? You won''t be able to unsee this one. The solution? It''s simpler than you think. The real question? Whether we''re ready to face it.


    **After:**

    > Once you notice it, you will keep noticing it. The solution is simpler than most people assume, though whether anyone is ready to act on it is a separate issue.


    **Severity:** context_warning · `no-rhetorical-questions`'
  patterns_md_leading_blanks: 1
no-rubric-echoing:
  category: Voice and register
  short_name: Rubric echoing
  description: Checks for assignment or rubric phrasing leaking into the prose.
  why_it_matters: Rubric echoing makes writing sound like assignment compliance rather than independent thought.
  severity: context_warning
  failure_modes:
  - provenance_residue
  - voice_erasure
  evidence_role: assignment_residue
  guidance: Review student/assignment prose for mirrored rubric language; preserve only where explicitly analysing a rubric.
  pattern_number: '40'
  patterns_md_heading: Rubric echoing
  patterns_md_body: '**Words to watch:** "the author creates a tone", "I can tell because", "this quote shows that", "according to the rubric", "meets the criteria".


    Common in AI-generated student essays. It mirrors assignment language instead of analysing the text. Preserve only if the piece is explicitly about the rubric.


    **Severity:** context_warning · `no-rubric-echoing`'
  patterns_md_leading_blanks: 1
no-section-scaffolding:
  category: Structural tells
  short_name: Repeated section scaffolding
  description: Checks for repeated section labels or repeated structural templates.
  why_it_matters: Repeated section structure makes the whole piece feel assembled from a template.
  severity: strong_warning
  failure_modes:
  - frictionless_structure
  evidence_role: repeated_template
  guidance: Fix repeated templates at Balanced and All; recommend preserving only for genuinely structured reference material.
  pattern_number: '38'
  patterns_md_heading: Section scaffolding
  patterns_md_body: '**Words to watch:** Identical subheadings repeated across sections ("How to make this work:", "Key takeaways:", "Why this matters:")


    AI-generated articles with numbered sections often repeat the same structural label in each section, creating a cookie-cutter template. The repetition itself is the tell — human writers vary their section structure and rarely use identical action labels across multiple sections.


    **Before:**

    > 1. Build trust early

    > How to make this work:

    > Start with small wins...

    >

    > 2. Communicate clearly

    > How to make this work:

    > Hold regular standups...

    >

    > 3. Measure outcomes

    > How to make this work:

    > Define success metrics...


    **After:**

    > 1. Build trust early

    > Start with small wins and let the team see results before asking for bigger commitments...

    >

    > 2. Communicate clearly

    > The teams that got this right held short daily standups, but the format mattered less than consistency...

    >

    > 3. Measure outcomes

    > We learned the hard way that vanity metrics kill momentum. Define what actually matters before you start tracking anything.


    **Severity:** strong_warning · `no-section-scaffolding`'
  patterns_md_leading_blanks: 1
no-significance-inflation:
  category: Content patterns
  short_name: Inflated significance
  description: Checks for language that makes ordinary claims sound historically important.
  why_it_matters: Inflated importance makes ordinary claims sound artificially momentous.
  severity: context_warning
  failure_modes:
  - synthetic_significance
  evidence_role: importance_inflation
  guidance: Fix inflated importance unless the source genuinely argues significance.
  alternatives: 'Constructions that claim symbolic weight for ordinary things: "stands as a testament", "marks a pivotal moment", "plays a crucial role", "represents a shift". The construction promises significance without supplying evidence.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | stands as a testament to | shows, is evidence for, proves | Often the sentence already says it. Cut the construction. |

    | marks a pivotal moment in | started, changed, was the first | Pick the verb that names what actually happened. |

    | plays a crucial role in | matters for, is part of, helps | Cut "crucial role" and name the role. |

    | represents a (shift / turning point) | started, changed, ended | The construction promises drama. Just say what changed. |

    | reflects (broader / wider / deeper) | comes from, is part of, is one example of | Drop the inflation adjective; name the specific connection. |

    | sets the stage for | started, made possible, came before | Almost always padding. Cut. |

    | has left an indelible mark | shaped, changed, influenced | If the mark is real, it can be named. |

    | paves the way for | leads to, comes before, makes possible | Cliché. Pick the plain verb. |'
  pattern_number: '1'
  patterns_md_heading: Significance inflation
  patterns_md_body: '**Words to watch:** stands/serves as, is a testament/reminder, a vital/significant/crucial/pivotal/key role/moment, underscores/highlights its importance, reflects broader, symbolizing its ongoing/enduring/lasting, setting the stage for, marking/shaping the, represents/marks a shift, key turning point, evolving landscape, indelible mark, deeply rooted, remarkably, strikingly, staggering/staggeringly


    Inflates importance by claiming things "represent" or "contribute to" broader trends without explaining why anyone should care.


    **Before:**

    > The Statistical Institute of Catalonia was officially established in 1989, marking a pivotal moment in the evolution of regional statistics in Spain. This initiative was part of a broader movement across Spain to decentralize administrative functions and enhance regional governance.


    **After:**

    > The Statistical Institute of Catalonia was established in 1989 to collect and publish regional statistics independently from Spain''s national statistics office.


    **Severity:** context_warning · `no-significance-inflation`'
  patterns_md_leading_blanks: 1
no-signposted-conclusions:
  category: Structural tells
  short_name: Signposted conclusion
  description: Checks for explicit conclusion labels and summary signposts.
  why_it_matters: Conclusion signposts often flatten the ending into a generic summary.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: structural_signpost
  guidance: Fix generic signposts in prose; recommend preserving academic/instructional structure when useful.
  alternatives: 'Phrases that announce a conclusion is coming. They tell the reader what to feel rather than letting the conclusion arrive on its own merits.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | In conclusion | (cut; let the final paragraph stand) | Reading the last paragraph is enough cue. |

    | To sum up | (cut) | Same. |

    | To summarise | (cut) | Same. |

    | Ultimately | (cut, or claim the conclusion directly) | "Ultimately, X" usually works as just "X". |

    | In the end | (cut) | Same. |

    | All things considered | (cut) | Performs balance the writer has not actually shown. |

    | The takeaway is | (cut; just state the takeaway) | The reader does not need a label on it. |

    | With that distinction in mind | (cut) | Filler transition. |

    | Looking ahead | (cut; or state the specific prediction) | Vague forward-glance. |'
  pattern_number: '44'
  patterns_md_heading: Signposted conclusions
  patterns_md_body: '**Words to watch:** "In summary,", "In conclusion,", "To summarise,", "To summarize,", "To conclude,", "To sum up,", "To wrap up,", section headings "Conclusion", "Final thoughts", "Key takeaways", "Summing up".


    Explicit conclusion labels turn the ending into a generic summary. AI overuses them — both at sentence level ("In conclusion, …") and as standalone section headings. Human writers usually let the argument''s last sentence carry the closing weight; explicit signposts often appear because the model has nothing left to say but still wants the piece to feel finished.


    **Tolerance note:** Academic abstracts, formal reports, instructional reference material, and structured policy briefs may legitimately use "Conclusion" or "Summary" headings as navigational signposts. The check fires on prose contexts where the signpost flattens the ending; preserve when the genre genuinely calls for one.


    **Before:**

    > In conclusion, the policy demonstrates the value of long-term thinking and the importance of stakeholder buy-in. Key takeaways include the need for clear communication and disciplined follow-through.


    **After:**

    > The policy succeeded because the council kept three commitments visible: weekly progress notes, named owners on every line item, and a public deadline. Each one was easy to abandon and the team didn''t.


    **Severity:** context_warning · `no-signposted-conclusions`


    **Detection:** Programmatic check `no-signposted-conclusions` (introduced before the 2026-04-08 file-move refactor at 618c723; **context_warning**).'
  patterns_md_leading_blanks: 2
no-soft-scaffolding:
  category: Filler and hedging
  short_name: Soft explainer scaffolding
  description: Checks for phrases that announce structure instead of making a point.
  why_it_matters: Soft scaffolding announces structure instead of doing useful writing work.
  severity: strong_warning
  failure_modes:
  - frictionless_structure
  evidence_role: explainer_scaffold
  guidance: Fix at Balanced and All; these phrases usually mark generated explainer structure rather than content.
  alternatives: 'Bland labelled-block introductions that mark a generated explainer arranging information into balanced sections. The phrases survive because they are not flashy, which is exactly the problem.


    | AI tell | What it usually means | Notes |

    |---|---|---|

    | One useful area is | (cut; name the area directly) | "One useful area is product design" wants to be "Product design is one example". |

    | Another useful area is | (cut; name the area) | Same. |

    | The main strength is | (claim the strength directly) | "The main strength is X" wants to be "X". |

    | The main risk is | (claim the risk) | Same. |

    | Good use usually comes down to | (cut; state what good use looks like) | Vague gesture toward criteria. State them. |

    | One thing to consider is | (cut; just consider it) | "One thing to consider is Y" wants to be "Consider Y" or just "Y". |

    | It is worth noting that | (cut; note it) | If it is worth noting, just note it. |

    | What''s interesting is | (cut; state what is interesting) | The writer is announcing rather than showing. |'
  pattern_number: '47'
  patterns_md_heading: Soft scaffolding
  patterns_md_body: '**Words to watch:** "One useful area...", "Another useful area...", "The main strength...", "The main risk...", "Good use usually comes down to...", "Comes down to giving/using/making...", "This can be helpful when...", "Especially useful when...", "In those cases,...", "With that distinction in mind,..."


    Bland transition phrases from generated explainers. They are not flashy, which is why they survive rewrites — they mark a generated explainer that is arranging information into bland labelled blocks instead of writing from a real line of thought. Distinct from #22 filler phrases (which are stock padding) and #34 tidy paragraph endings (which close paragraphs); soft scaffolding sits between sentences as a connective tissue tic.


    **Before:**

    > One useful area is structuring feedback. Another useful area is timing it well. The main strength of these approaches is consistency. Good use usually comes down to giving the receiver enough context.


    **After:**

    > Feedback works best when you can name the screen, the moment, and what surprised you. The reviewer who said "this dashboard is confusing" cost me half a day; the reviewer who said "the metric on the top-right is the one I read first and I can''t tell what it''s measuring" saved me a week.


    **Severity:** strong_warning · `no-soft-scaffolding`


    **Detection:** Programmatic check `no-soft-scaffolding` (added in 9ce1cec on 2026-04-27 as part of the AI-writing-signal framework expansion). The soft-scaffold phrase set is also referenced in pattern #7''s preamble as part of AI vocabulary discussion, but it is enforced as its own check rather than folded into the vocabulary cluster.'
  patterns_md_leading_blanks: 2
no-staccato-sequences:
  category: Filler and hedging
  short_name: Generic staccato emphasis
  description: Checks for repeated short dramatic sentences used as generic emphasis.
  why_it_matters: Repeated short emphasis beats can make prose sound generated rather than naturally paced.
  severity: context_warning
  failure_modes:
  - genre_misfit
  - frictionless_structure
  evidence_role: rhythm_signal
  guidance: Fix generic emphasis; recommend preserving character voice, humour, panic, dialogue, or literary rhythm.
  pattern_number: '25'
  patterns_md_heading: Staccato rhythm in extended contexts
  patterns_md_body: 'This supplements the hard constraint on staccato fragments. Beyond the obvious standalone fragments, watch for the subtler pattern: AI places short sentences at the start of sections (to hook), at the end of paragraphs (to land), and in sequences of two or three (to build momentum). These positions are predictable.


    **Tolerance note:** Staccato is not automatically bad. Preserve it when it is character voice, panic, comedy, dialogue, aphorism, or deliberate literary rhythm. Cut it when it functions as generic article emphasis.


    **Before:**

    > The data was clear. Unmistakably so. Every metric pointed in the same direction. And that direction was down.


    **After:**

    > The data pointed unambiguously in one direction: every metric was declining, and the trend had been consistent for three consecutive quarters.


    **Severity:** context_warning · `no-staccato-sequences`'
  patterns_md_leading_blanks: 2
no-superficial-ing:
  category: Content patterns
  short_name: Tacked-on -ing analysis
  description: Checks for trailing -ing clauses that pretend to analyse without adding meaning.
  why_it_matters: Tacked-on -ing clauses often pretend to analyse while adding little.
  severity: strong_warning
  failure_modes:
  - generic_abstraction
  evidence_role: analysis_substitution
  guidance: Fix tacked-on analysis clauses unless they carry precise causal meaning.
  pattern_number: '3'
  patterns_md_heading: Superficial -ing analyses
  patterns_md_body: '**Words to watch:** highlighting/underscoring/emphasizing..., ensuring..., reflecting/symbolizing..., contributing to..., cultivating/fostering..., encompassing..., showcasing...


    Present participle phrases tacked onto sentences to simulate analytical depth without adding information.


    **Before:**

    > The temple''s color palette of blue, green, and gold resonates with the region''s natural beauty, symbolizing Texas bluebonnets, the Gulf of Mexico, and the diverse Texan landscapes, reflecting the community''s deep connection to the land.


    **After:**

    > The temple uses blue, green, and gold. According to the architect, the colours were chosen to reference local bluebonnets and the Gulf coast.


    **Severity:** strong_warning · `no-superficial-ing`'
  patterns_md_leading_blanks: 2
no-this-chains:
  category: Voice and register
  short_name: Repeated 'This...' chains
  description: Checks for several consecutive sentences beginning with vague This constructions.
  why_it_matters: Repeated vague This sentences create generic analysis and weak subject control.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - voice_erasure
  evidence_role: sentence_subject
  guidance: Fix mechanical sentence starts; recommend preserving only if rhythmically deliberate.
  pattern_number: 35b
  patterns_md_heading: Repeated 'This …' chains
  patterns_md_body: 'Three or more consecutive sentences in a paragraph that begin with "This [verb]" — typically "This shows…", "This means…", "This highlights…", "This underscores…". Distinct from #35a orphaned demonstratives, which catches a single vague-subject `this` sentence; #35b is the chain pattern, where a paragraph keeps using `This` as the subject placeholder sentence after sentence.


    **Before:**

    > The framework launched in March. This brought consolidation. This reduced operational cost. This freed engineering time. This let the team focus on the next initiative.


    **After:**

    > The framework launched in March, consolidating tooling that had drifted across three teams since 2024. The reduced operational cost is what gave engineering room to focus on the next initiative.


    **Severity:** context_warning · `no-this-chains`


    **Detection:** Programmatic check `no-this-chains` (added in PR #1 at ee05591 on 2026-04-01; **context_warning**). Walks each paragraph and flags 3+ consecutive sentences matching `^this\s+(?!is)\w+`. Distinct from #35a orphaned demonstratives (single-sentence vague-subject `this`); #35b is the multi-sentence chain pattern within a paragraph.'
  patterns_md_leading_blanks: 2
no-tidy-paragraph-endings:
  category: Voice and register
  short_name: Tidy paragraph endings
  description: Checks for repeated miniature conclusions at paragraph ends.
  why_it_matters: Repeated tidy endings make paragraphs feel over-resolved and templated.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - voice_erasure
  evidence_role: paragraph_closure
  guidance: Cut generic paragraph-final summaries unless they carry a necessary argument turn.
  pattern_number: '34'
  patterns_md_heading: Per-paragraph miniature conclusions
  patterns_md_body: 'Every paragraph wraps up with a tidy summary sentence that transitions perfectly to the next. Humans digress, leave threads hanging, circle back later. AI''s paragraph-level tidiness is itself a tell.


    **Before:**

    > The study surveyed 400 teachers across 12 districts. Most reported increased workload since 2020. The takeaway is clear: teachers are stretched thin and the trend shows no signs of reversing.

    >

    > The funding picture compounds this pressure. Per-pupil spending has risen by 4% nominally but fallen in real terms. This financial squeeze makes the workload problem even harder to address.


    **After:**

    > The study surveyed 400 teachers across 12 districts. Most reported increased workload since 2020, with marking and administrative tasks growing fastest.

    >

    > Per-pupil spending has risen by 4% nominally but fallen in real terms. Whether the two trends are connected is debatable, though several principals I spoke to thought so.


    When you spot a paragraph where the final sentence restates the paragraph''s point or transitions smoothly to the next topic, consider cutting it or replacing it with something that leaves a thread open.


    Watch for endings such as "That is why...", "The takeaway is...", "The result is...", "In the end,...", "Ultimately,...", and "With that distinction in mind...". One can be legitimate. Three or more usually means the piece is landing every paragraph the same way.


    Also check paragraph size. AI-generated longform often settles into near-identical blocks: ten paragraphs of 65-85 words, each making one balanced point. Human paragraphs usually show uneven pressure; some are short, some wander, some carry a scene or example longer than expected.


    **Severity:** context_warning · `no-tidy-paragraph-endings` and context_warning · `paragraph-length-uniformity` (this pattern covers two related checks)'
  patterns_md_leading_blanks: 2
no-triad-density:
  category: Language and grammar
  short_name: Triad density
  description: Checks whether three-part list structures are overused across the piece.
  why_it_matters: Too many three-part lists create a recognisable generated cadence.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: list_rhythm
  guidance: Fix density-driven triads; recommend preserving if lists are structural or rhetorical.
  pattern_number: 10a
  patterns_md_heading: Triad density
  patterns_md_body: 'The density variant of #10 rule of three. While #10 catches a single forced triad as a content pattern, #10a fires when triads cluster across longer prose: four or more "X, Y, and Z" / "X, Y, or Z" structures in a piece of 300+ words. This is the rate-of-triads metric — even when each individual triad reads naturally, the aggregate cadence becomes mechanical.


    **Before:**

    > The team values clarity, directness, and rigour. Their meetings are short, focused, and outcome-driven. The retros surface what worked, what didn''t, and what to try next. The roadmap balances delivery, learning, and team health.


    **After:**

    > The team runs short meetings and uses retros to decide what to try next. The roadmap is mostly about delivery, with deliberate space for the things the team is still learning how to do well.


    **Severity:** context_warning · `no-triad-density`


    **Detection:** Programmatic check `no-triad-density` (added in 42e4d00 on 2026-04-02 as part of the structural AI detection expansion; **context_warning**). Counts "X, Y, and/or Z" patterns where each item is 1-4 words; fails at 4+ triads in prose of 300+ words. Distinct from #10 forced triads (single-instance, semantic check); #10a is the cumulative-density check across a piece.'
  patterns_md_leading_blanks: 2
no-unicode-flair:
  category: Structural tells
  short_name: Decorative Unicode
  description: Checks for symbols and decorative punctuation that look like generated formatting.
  why_it_matters: Decorative symbols can make output look like generated formatting.
  severity: context_warning
  failure_modes:
  - provenance_residue
  - genre_misfit
  evidence_role: formatting_residue
  guidance: Remove decorative symbols in prose; preserve only where symbols are part of a real UI, checklist, or quoted source.
  pattern_number: 31a
  patterns_md_heading: Unicode flair
  patterns_md_body: '**Words/symbols to watch:** arrows, checkmarks, stars, ornamental bullets, emoji-style symbols in prose or professional content.


    Decorative Unicode makes prose look like a generated checklist or social post. Remove it unless the symbols are part of a real UI, quoted material, or an actual checklist whose visual form matters.


    **Severity:** context_warning · `no-unicode-flair`'
  patterns_md_leading_blanks: 1
no-vague-attributions:
  category: Content patterns
  short_name: Vague attributions
  description: Checks for unnamed-authority phrasing such as experts argue, observers note, or industry reports say.
  why_it_matters: Unnamed expert and report citations create the illusion of consensus without naming a real source.
  severity: strong_warning
  failure_modes:
  - synthetic_significance
  - generic_abstraction
  evidence_role: attribution_vagueness
  guidance: Fix at Balanced and All; replace unnamed authorities with a named source, study, or quote.
  pattern_number: '5'
  patterns_md_heading: Vague attributions
  patterns_md_body: '**Words to watch:** Industry reports, Observers have cited, Experts argue, Some critics argue, several sources/publications (when few cited)


    Attributes opinions to vague authorities without specific sources, creating illusions of consensus.


    **Before:**

    > Due to its unique characteristics, the Haolai River is of interest to researchers and conservationists. Experts believe it plays a crucial role in the regional ecosystem.


    **After:**

    > The Haolai River supports several endemic fish species, according to a 2019 survey by the Chinese Academy of Sciences.


    **Severity:** strong_warning · `no-vague-attributions`


    **Detection:** Programmatic check `no-vague-attributions` (added in U1 of the audit-report redesign).'
  patterns_md_leading_blanks: 2
overall-ai-signal-pressure:
  category: Aggregate AI-signal pressure
  short_name: AI pressure from stacked signals
  description: Looks for several weaker AI-writing signals appearing together, which can make a draft feel machine-packaged even when no single signal is decisive.
  why_it_matters: Several weak signals appearing together can make a draft feel machine-packaged even when each signal alone is explainable.
  severity: context_warning
  failure_modes:
  - generic_abstraction
  - frictionless_structure
  evidence_role: aggregate_pressure
  guidance: Review aggregate signal pressure; this combines weak signals and Kobak excess-vocabulary evidence but is not an authorship verdict.
paragraph-length-uniformity:
  category: Structural tells
  short_name: Paragraph length uniformity
  description: Checks whether paragraphs are suspiciously similar in length.
  why_it_matters: Paragraphs of similar length can signal generated structure and low natural variation.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  evidence_role: layout_rhythm
  guidance: Review as a structural signal; vary paragraph lengths when the piece reads like a generated article template.
sentence-length-variance:
  category: Structural tells
  short_name: Sentence rhythm variance
  description: Checks whether sentence lengths are too uniform across longer prose.
  why_it_matters: Low rhythm variation makes paragraphs feel mechanically produced.
  severity: context_warning
  failure_modes:
  - frictionless_structure
  - genre_misfit
  evidence_role: rhythm_signal
  guidance: Use as a rhythm signal, not a hard failure for short or intentionally uniform forms.
  pattern_number: '52'
  patterns_md_heading: Sentence length variance
  patterns_md_body: 'A coarse rhythm metric for prose of 100+ words. Human writing varies sentence length naturally, mixing short punch sentences with longer connective passages. AI prose tends toward the centre of the distribution: most sentences land in a similar word count band, and the resulting cadence reads mechanical even when individual sentences are competent.


    **Tolerance note:** Some genres legitimately run uniform: instructional steps, headlines, dialogue, dictionary entries, telegraphic memos. The check skips short-form prose under 100 words. Treat low variance as a signal, not a hard fail — preserve when the form genuinely calls for uniformity.


    **Before:**

    > The team uses agile methods. They run two-week sprints. Each sprint starts with planning. Each sprint ends with a retro. The team values feedback. They iterate based on what they learn.


    **After:**

    > The team uses agile methods, running two-week sprints that bracket each piece of work between planning and a retro. Feedback drives iteration: each sprint adjusts based on what the last one taught them.


    **Severity:** context_warning · `sentence-length-variance`


    **Detection:** Programmatic check `sentence-length-variance` (in the catalogue since the initial release at e68bc3d on 2026-04-01; **context_warning**). Computes the standard deviation of sentence word counts and fails when the SD drops below 4. Skipped on prose under 100 words and 6 sentences. Distinct from #34 paragraph-length uniformity (which measures paragraph block sizes, not sentence-level rhythm) and from #25 staccato (which targets very short standalone sentences regardless of variance).'
  patterns_md_leading_blanks: 2
vocabulary-diversity:
  category: Language and grammar
  short_name: Vocabulary diversity
  description: Checks for unusually repetitive vocabulary in longer text.
  why_it_matters: Low vocabulary variety can make longer prose feel repetitive and mechanically produced.
  severity: context_warning
  failure_modes:
  - generic_abstraction
  - genre_misfit
  evidence_role: lexical_distribution
  guidance: Use as a coarse signal; old prose, dialogue, and technical writing may fail legitimately.
  pattern_number: '53'
  patterns_md_heading: Vocabulary diversity
  patterns_md_body: 'A coarse type-token ratio metric for prose of 150+ words: the ratio of unique words to total words. AI-generated prose often shows lower lexical diversity than human writing of the same length, leaning on a small core of stock phrases and reusing them across paragraphs. Human writing on the same topic typically reaches further into the lexicon.


    **Tolerance note:** Several legitimate forms run low on type-token ratio: dialogue (where characters reuse words), technical writing (where domain terms repeat by necessity), and old prose styles that favour repetition for rhetorical effect. Treat low diversity as a coarse signal, not a hard fail — preserve when the genre genuinely calls for it.


    **Before:**

    > The strategy emphasises customer outcomes. The strategy emphasises operational efficiency. The strategy emphasises sustainable growth. The strategy emphasises team alignment.


    **After:**

    > The strategy chases four things at once: customer outcomes, operational efficiency, sustainable growth, and team alignment. Each one feeds the next, which is the bet that makes the document work or fall apart.


    **Severity:** context_warning · `vocabulary-diversity`


    **Detection:** Programmatic check `vocabulary-diversity` (added in PR #3 at 3c013e3 on 2026-04-01 as part of the AI-writing research expansion; **context_warning**). Computes type-token ratio on stripped lowercased words and fails below a corpus-tuned threshold. Skipped on prose under 150 words. Distinct from #11 synonym cycling (which targets the *opposite* failure mode — over-substituting synonyms for the same referent — and is a manual-only check) and from #7 AI vocabulary words (which targets specific stock vocabulary, not the lexical-density distribution).'
  patterns_md_leading_blanks: 2
